<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - Jio WiFi</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-container{max-width:420px;margin:6rem auto;padding:2rem;background:#fff;border-radius:16px;border:1px solid #e5e7eb}
    .login-container h2{margin:0 0 1rem}
    .form-group{margin-bottom:1rem}
    .error{color:#b91c1c;margin-bottom:1rem}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-logo">Jio</span>
        <div>
          <h1>Admin</h1>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="login-container">
        <h2>Dashboard Login</h2>
        <p>Enter the admin password to access the booking dashboard.</p>
        <div id="error" class="error" style="display:none">Invalid credentials</div>
        <form method="post" action="/admin/login">
          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </div>
          <div>
            <button class="button button-primary" type="submit">Sign in</button>
            <a class="button button-secondary" href="/" style="margin-left:0.5rem">Home</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error')) document.getElementById('error').style.display = 'block';
  </script>
</body>
</html>
